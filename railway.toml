# This file configures the build and run process for Railway so that the backend can run Prisma Migrations.
[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x", "openssl"]

[deploy]
startCommand = "npm run start:prod --workspace=@gymcore/api"
restartPolicyType = "ON_FAILURE"
